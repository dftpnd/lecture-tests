# Local dev environment: infra (postgres, redis, minio) + api + worker.
# vLLM is NOT here — it runs in your k8s cluster; point VLLM_BASE_URL at it.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports: ["9000:9000", "9001:9001"]
    volumes: ["miniodata:/data"]

  # Creates the bucket on startup, then exits.
  createbuckets:
    image: minio/mc:latest
    depends_on: [minio]
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY}; do sleep 1; done;
      mc mb -p local/${MINIO_BUCKET};
      exit 0;
      "

  api:
    build: { context: ./backend }
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: [.env]
    ports: ["8000:8000"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }
      minio: { condition: service_started }
    volumes: ["./backend:/app"]

  # GPU worker: ffmpeg + faster-whisper + vLLM calls. Needs a GPU.
  worker:
    build: { context: ./backend }
    command: arq app.worker.WorkerSettings
    env_file: [.env]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }
      minio: { condition: service_started }
    volumes: ["./backend:/app"]
    deploy:
      resources:
        reservations:
          devices:
            - { driver: nvidia, count: 1, capabilities: [gpu] }

volumes:
  pgdata:
  miniodata:
