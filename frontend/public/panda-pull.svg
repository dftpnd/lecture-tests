<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 640" width="100%" height="100%">
  <!-- Стили для контуров, имитирующих маркерную рисовку -->
  <style>
    .sketch-line {
      fill: none;
      stroke: #0A0A0B;
      stroke-width: 10;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .solid-black {
      fill: #0A0A0B;
    }
  </style>

  <!-- ГОЛОВА И УШИ -->
  <!-- Левое ухо -->
  <path d="M 125,215 C 105,160 85,75 185,55 C 235,45 285,115 270,165" class="sketch-line solid-black" />

  <!-- Правое ухо -->
  <path d="M 545,150 C 585,115 635,90 700,95 C 770,100 780,195 725,250" class="sketch-line solid-black" />

  <!-- Основной контур головы панды (перенос "живых" линий оригинального эскиза) -->
  <path d="M 175,170
           C 115,190 85,255 75,340
           C 65,425 110,510 185,550
           C 275,600 415,620 545,595
           C 675,570 745,465 745,340
           C 745,215 675,165 545,145
           C 445,130 265,140 175,170 Z"
        fill="#F9FAFB" stroke="#0A0A0B" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" />

  <!-- ЛЯМКИ И ПОВЯЗКА -->
  <!-- Верхняя лямка повязки -->
  <path d="M 80,355 L 340,230 L 440,147" class="sketch-line" stroke-width="11" />

  <!-- Нижняя лямка повязки -->
  <path d="M 82,362 L 235,320" class="sketch-line" stroke-width="11" />

  <!-- Пятно-повязка на левом глазу (асимметричный круг) -->
  <path d="M 220,315
           C 170,305 180,215 245,210
           C 310,205 345,290 320,340
           C 295,390 245,365 220,315 Z" fill="#0A0A0B" />

  <!-- КИБЕР-ГЛАЗ (ПРАВОЕ ПЯТНО) -->
  <!-- Черное пятно вокруг правого глаза -->
  <path d="M 480,270
           C 470,215 560,185 625,210
           C 690,235 710,345 680,390
           C 650,435 525,415 480,270 Z" fill="#0A0A0B" />

  <!-- Точная структура гипнотического зрачка (чередование колец) -->
  <g transform="translate(588, 298)">
    <!-- 1. Внешнее синее кольцо -->
    <circle cx="0" cy="0" r="58" fill="#0025FF" />

    <!-- 2. Желтое кольцо -->
    <circle cx="0" cy="0" r="48" fill="#FFDE00" />

    <!-- 3. Красное кольцо -->
    <circle cx="0" cy="0" r="39" fill="#FF003C" />

    <!-- 4. Синее кольцо -->
    <circle cx="0" cy="0" r="30" fill="#0025FF" />

    <!-- 5. Желтое кольцо -->
    <circle cx="0" cy="0" r="21" fill="#FFDE00" />

    <!-- 6. Красный центр (зрачок) -->
    <circle cx="0" cy="0" r="11" fill="#FF003C" />
  </g>

  <!-- ЭЛЕМЕНТЫ ЛИЦА -->
  <!-- Нос (округленный брутальный треугольник маркером) -->
  <path d="M 370,410
           C 355,400 425,400 410,410
           C 395,420 425,465 390,470
           C 355,465 385,420 370,410 Z" fill="#0A0A0B" />

  <!-- Рот (фирменный плоский штрих) -->
  <path d="M 360,525 L 450,522" class="sketch-line" stroke-width="12" />
</svg>
