<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Темы → Тесты</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0F2040" />
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- iOS "Add to Home Screen" -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- "default" lets iOS reserve the status-bar area instead of drawing the
         app underneath it (which glued the header to the very top / notch). -->
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Лекции→Тесты" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Follow the OS light/dark theme (matches the app's auto colour scheme)
         and avoid a white flash before the stylesheet loads. Safe-area insets
         are handled per-component (PageShell / quiz) via Tailwind utilities. -->
    <style>
      :root { color-scheme: light dark; }
      html, body { margin: 0; min-height: 100%; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
