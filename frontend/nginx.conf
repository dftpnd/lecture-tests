server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the FastAPI service (same path prefix the frontend uses).
    location /api/ {
        proxy_pass http://lecture-tests-api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 0;   # allow large video uploads if they ever go via API
    }
}
