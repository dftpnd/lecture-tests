server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Serve the manifest with its proper MIME type (scoped so the default
    # mime.types map still applies to JS/CSS/etc.).
    location = /manifest.webmanifest {
        default_type application/manifest+json;
        try_files $uri =404;
    }

    # Never cache the service worker so app updates roll out on the next visit.
    location = /sw.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # The entry HTML must always be revalidated, otherwise the browser/SW can
    # pin an old index.html that points at stale (now-deleted) hashed bundles.
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri =404;
    }

    # Hashed build assets are content-addressed — safe to cache forever.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA fallback (falling back to /index.html re-enters the = /index.html
    # location above, so the no-cache header still applies).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the FastAPI service (same path prefix the frontend uses).
    location /api/ {
        proxy_pass http://lecture-tests-api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 0;          # videos upload through the API (no size cap)
        proxy_request_buffering off;      # stream the body straight to the API
        proxy_read_timeout 3600s;         # the API->MinIO write finishes after upload
        proxy_send_timeout 3600s;
    }
}
