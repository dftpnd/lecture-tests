apiVersion: apps/v1
kind: Deployment
metadata:
  name: lecture-tests-redis
  labels: {{- include "lt.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels: { app: lecture-tests-redis }
  template:
    metadata:
      labels: { app: lecture-tests-redis }
    spec:
      containers:
        - name: redis
          image: {{ .Values.redis.image }}
          ports: [{ containerPort: 6379 }]
---
apiVersion: v1
kind: Service
metadata:
  name: lecture-tests-redis
  labels: {{- include "lt.labels" . | nindent 4 }}
spec:
  selector: { app: lecture-tests-redis }
  ports: [{ port: 6379, targetPort: 6379 }]
