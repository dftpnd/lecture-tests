apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: lecture-tests-models
  labels: {{- include "lt.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ .Values.worker.modelsStorage }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lecture-tests-worker
  labels: {{- include "lt.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels: { app: lecture-tests-worker }
  template:
    metadata:
      labels: { app: lecture-tests-worker }
    spec:
      {{- if .Values.worker.shareGpu }}
      # Use the nvidia runtime so NVIDIA_VISIBLE_DEVICES exposes the GPU without
      # a device-plugin allocation (the single GPU unit is held by vLLM).
      runtimeClassName: {{ .Values.worker.runtimeClassName | default "nvidia" }}
      {{- end }}
      containers:
        - name: worker
          image: "{{ .Values.images.worker.repository }}:{{ .Values.images.worker.tag }}"
          imagePullPolicy: {{ .Values.images.worker.pullPolicy }}
          command: ["arq", "app.worker.WorkerSettings"]
          envFrom:
            - configMapRef: { name: lecture-tests-config }
            - secretRef: { name: lecture-tests-secret }
          {{- if .Values.worker.shareGpu }}
          env:
            # Share the GPU with vLLM without a device-plugin allocation: the
            # NVIDIA container runtime exposes the card when these are set.
            # No nvidia.com/gpu request (the single GPU is already held by vLLM).
            - { name: NVIDIA_VISIBLE_DEVICES, value: "all" }
            - { name: NVIDIA_DRIVER_CAPABILITIES, value: "compute,utility" }
          {{- end }}
          {{- if gt (int .Values.worker.gpu) 0 }}
          resources:
            limits:
              nvidia.com/gpu: {{ .Values.worker.gpu }}
          {{- end }}
          volumeMounts:
            - { name: models, mountPath: /models }
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: lecture-tests-models
