apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: lecture-tests-postgres
  labels: {{- include "lt.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ .Values.postgres.storage }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lecture-tests-postgres
  labels: {{- include "lt.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels: { app: lecture-tests-postgres }
  template:
    metadata:
      labels: { app: lecture-tests-postgres }
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          env:
            - { name: POSTGRES_USER, value: {{ .Values.postgres.user | quote }} }
            - { name: POSTGRES_PASSWORD, value: {{ .Values.postgres.password | quote }} }
            - { name: POSTGRES_DB, value: {{ .Values.postgres.db | quote }} }
            - { name: PGDATA, value: /var/lib/postgresql/data/pgdata }
          ports: [{ containerPort: 5432 }]
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: lecture-tests-postgres
---
apiVersion: v1
kind: Service
metadata:
  name: lecture-tests-postgres
  labels: {{- include "lt.labels" . | nindent 4 }}
spec:
  selector: { app: lecture-tests-postgres }
  ports: [{ port: 5432, targetPort: 5432 }]
