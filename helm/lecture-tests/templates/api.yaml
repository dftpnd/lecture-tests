apiVersion: apps/v1
kind: Deployment
metadata:
  name: lecture-tests-api
  labels: {{- include "lt.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels: { app: lecture-tests-api }
  template:
    metadata:
      labels: { app: lecture-tests-api }
    spec:
      initContainers:
        # Run DB migrations before the API starts; retry until Postgres is up.
        - name: migrate
          image: "{{ .Values.images.api.repository }}:{{ .Values.images.api.tag }}"
          imagePullPolicy: {{ .Values.images.api.pullPolicy }}
          command:
            - sh
            - -c
            - "for i in $(seq 1 30); do alembic upgrade head && exit 0; echo 'waiting for db...'; sleep 3; done; exit 1"
          envFrom:
            - configMapRef: { name: lecture-tests-config }
            - secretRef: { name: lecture-tests-secret }
      containers:
        - name: api
          image: "{{ .Values.images.api.repository }}:{{ .Values.images.api.tag }}"
          imagePullPolicy: {{ .Values.images.api.pullPolicy }}
          command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
          envFrom:
            - configMapRef: { name: lecture-tests-config }
            - secretRef: { name: lecture-tests-secret }
          ports: [{ containerPort: 8000 }]
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: lecture-tests-api
  labels: {{- include "lt.labels" . | nindent 4 }}
spec:
  selector: { app: lecture-tests-api }
  ports: [{ port: 8000, targetPort: 8000 }]
