# Images — each is versioned independently with semver (bump only what changed).
# Build with: ./scripts/build.sh api=1.1.0   (then helm upgrade --set images.api.tag=1.1.0)
images:
  api:
    repository: lecture-tests-api
    tag: 1.8.1
    pullPolicy: IfNotPresent
  worker:
    repository: lecture-tests-worker
    tag: 1.0.0
    pullPolicy: IfNotPresent
  frontend:
    repository: lecture-tests-frontend
    tag: 1.10.8
    pullPolicy: IfNotPresent

# vLLM is reused from the existing cluster deployment — point at its service/URL.
vllm:
  baseUrl: "http://192.168.1.116:30800/v1"
  model: "qwen3-14b-awq"

whisper:
  model: "large-v3"
  device: "cuda"
  computeType: "float16"
  language: "ru"

postgres:
  image: postgres:16-alpine
  user: lectures
  password: lectures        # override via --set or a sealed secret in prod
  db: lectures
  storage: 5Gi

redis:
  image: redis:7-alpine

# Set create=false in prod and manage `lecture-tests-secret` via a SealedSecret
# (see helm/sealed-secrets/). When false, the keys below are NOT used for the Secret.
secret:
  create: true

minio:
  image: minio/minio:latest
  accessKey: lt-4775ac6b
  secretKey: T8G4xPol3zi0b6dRBnmQlt45QoUj0T   # rotated off default; MinIO S3 API is exposed externally
  bucket: lectures
  storage: 50Gi
  # Browser-reachable address for presigned upload/download URLs.
  # Must be externally accessible (NodePort/Ingress/LB), NOT the in-cluster name.
  # External IP, router-forwards WAN :443 -> 192.168.1.116:30900 (plain HTTP on
  # 443, since secure=false). Port is part of the presigned signature, so it must
  # match exactly what the browser connects to.
  publicEndpoint: "85.23.152.89:443"

worker:
  replicas: 1                 # one GPU job at a time
  # Number of nvidia.com/gpu units to request via the device plugin. Keep 0 when
  # sharing an already-allocated GPU with vLLM via shareGpu (below).
  gpu: 0
  # Expose the GPU through the NVIDIA container runtime (NVIDIA_VISIBLE_DEVICES)
  # without a device-plugin allocation — lets the worker share vLLM's GPU.
  shareGpu: true
  runtimeClassName: nvidia    # RuntimeClass that selects the nvidia runtime
  # Persistent cache for the Whisper model (avoids re-download on restart).
  modelsStorage: 20Gi

frontend:
  service:
    type: NodePort
    nodePort: 30080

ingress:
  enabled: false
  host: lectures.local
