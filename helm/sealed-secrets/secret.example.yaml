# Template for the app secret. Copy to `secret.plain.yaml`, fill in real values,
# then run ./seal.sh to produce sealed-secret.yaml. NEVER commit secret.plain.yaml
# (it is gitignored) — only the sealed output is safe to commit.
apiVersion: v1
kind: Secret
metadata:
  name: lecture-tests-secret
  namespace: default            # must match the release namespace
type: Opaque
stringData:
  DATABASE_URL: "postgresql+asyncpg://lectures:CHANGE_ME@lecture-tests-postgres:5432/lectures"
  MINIO_ACCESS_KEY: "CHANGE_ME"
  MINIO_SECRET_KEY: "CHANGE_ME"
